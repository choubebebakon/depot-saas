name: Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_DB: depot_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend-depot/package-lock.json

      - name: Install dependencies
        run: |
          cd backend-depot
          npm ci

      - name: Generate Prisma Client
        run: |
          cd backend-depot
          npx prisma generate

      - name: Run Lint
        run: |
          cd backend-depot
          npm run lint || true # On ne bloque pas encore totalement sur le lint

      - name: Run Tests
        run: |
          cd backend-depot
          npm run test
        env:
          DATABASE_URL: "postgresql://postgres:postgres_password@localhost:5432/depot_db_test?schema=public"
          JWT_SECRET: "test_secret_ci"
          JWT_REFRESH_SECRET: "test_refresh_secret_ci"
          CAMPAY_WEBHOOK_SECRET: "test_webhook_secret"

      - name: Build Check
        run: |
          cd backend-depot
          npm run build
